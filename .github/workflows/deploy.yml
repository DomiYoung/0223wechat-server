name: Deploy WeChat Server

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lockb'
      - 'deploy.sh'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: bun run build

      - name: Deploy to Server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
          DEST_PATH: /www/wwwroot/0223wechat-server
        run: |
          # Setup SSHpass
          sudo apt-get update && sudo apt-get install -y sshpass rsync

          echo "🚀 Syncing files..."
          sshpass -p "$SERVER_PASS" rsync -rz --progress -e "ssh -o StrictHostKeyChecking=no" package.json $SERVER_USER@$SERVER_IP:$DEST_PATH/
          sshpass -p "$SERVER_PASS" rsync -rz --progress --delete -e "ssh -o StrictHostKeyChecking=no" dist/ $SERVER_USER@$SERVER_IP:$DEST_PATH/dist/
          sshpass -p "$SERVER_PASS" rsync -rz --progress --delete -e "ssh -o StrictHostKeyChecking=no" api_dump/ $SERVER_USER@$SERVER_IP:$DEST_PATH/api_dump/

          echo "🚀 Restarting PM2 service..."
          sshpass -p "$SERVER_PASS" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "cd $DEST_PATH && pm2 restart wechat-server"
          echo "✅ Deployment Successful!"
