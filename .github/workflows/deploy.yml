name: Deploy WeChat Server

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: bun run build

      - name: Deploy to Server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
          DEST_PATH: /www/wwwroot/0223wechat-server
        run: |
          # 安装 sshpass 和 rsync（使用缓存加速）
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync > /dev/null

          SSH_CMD="sshpass -p $SERVER_PASS ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP"
          RSYNC_CMD="sshpass -p $SERVER_PASS rsync -rz --progress -e 'ssh -o StrictHostKeyChecking=no'"

          # 1. 备份当前 dist（回滚用）
          echo "📦 备份当前版本..."
          $SSH_CMD "cd $DEST_PATH && rm -rf dist.bak && cp -r dist dist.bak 2>/dev/null || true"

          # 2. 同步文件
          echo "🚀 同步核心文件..."
          sshpass -p "$SERVER_PASS" rsync -rz -e "ssh -o StrictHostKeyChecking=no" package.json package-lock.json tsconfig.json ecosystem.config.cjs $SERVER_USER@$SERVER_IP:$DEST_PATH/
          sshpass -p "$SERVER_PASS" rsync -rz --delete -e "ssh -o StrictHostKeyChecking=no" dist/ $SERVER_USER@$SERVER_IP:$DEST_PATH/dist/
          sshpass -p "$SERVER_PASS" rsync -rz --delete -e "ssh -o StrictHostKeyChecking=no" src/ $SERVER_USER@$SERVER_IP:$DEST_PATH/src/
          sshpass -p "$SERVER_PASS" rsync -rz --delete -e "ssh -o StrictHostKeyChecking=no" scripts/ $SERVER_USER@$SERVER_IP:$DEST_PATH/scripts/

          # 3. 安装依赖
          echo "📦 安装依赖..."
          $SSH_CMD "cd $DEST_PATH && npm install --production 2>&1 | tail -5"

          # 4. 数据库迁移
          echo "🗄️ 执行数据库迁移..."
          $SSH_CMD "cd $DEST_PATH && npx tsx scripts/db_migrate_core_constraints.ts 2>&1"
          $SSH_CMD "cd $DEST_PATH && npx tsx scripts/db_migrate_reservation_unique.ts 2>&1"

          # 5. 重启服务
          echo "🚀 重启服务..."
          $SSH_CMD "cd $DEST_PATH && pm2 startOrRestart ecosystem.config.cjs --env production"

          # 6. 健康检查（等待 5 秒后验证）
          echo "🏥 健康检查..."
          sleep 5
          HEALTH_STATUS=$($SSH_CMD "curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8199/mp/venues -H 'Content-Type: application/json' -d '{}' --connect-timeout 10")
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ 部署成功！健康检查通过 (HTTP $HEALTH_STATUS)"
          else
            echo "❌ 健康检查失败 (HTTP $HEALTH_STATUS)，回滚..."
            $SSH_CMD "cd $DEST_PATH && rm -rf dist && mv dist.bak dist && pm2 restart wechat-server"
            exit 1
          fi

          # 7. 清理备份
          $SSH_CMD "cd $DEST_PATH && rm -rf dist.bak"
          echo "🎉 部署完成！"
